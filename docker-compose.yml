services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    user: "0:0"
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - NEXT_TELEMETRY_DISABLED=1
      - RKEEPER_DB_PATH=/data/rkeeper_data.db
      - MASTRA_SERVER_URL=http://mastra:4111
      - HERMES_HOME=/opt/hermes
      - HERMES_RESTAURANT_STACK_DIR=/opt/restaurant-stack
      - HERMES_DASHBOARD_URL=http://hermes-dashboard:9119
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-admin}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:-HermesDashboard2026!}
      - HERMES_SKILLS_DIR=/opt/hermes/skills
      - HERMES_TELEGRAM_AGENTS_DIR=/opt/hermes/telegram-agents
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      - AUTH_DB_PATH=/data/auth.db
      - AUTH_ADMIN_EMAIL=${AUTH_ADMIN_EMAIL:-admin@rkdash.ru}
      - AUTH_ADMIN_PASSWORD=${AUTH_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./rkeeper_etl:/data
      - ./.dbg:/app/.dbg
      - ./hermes_data:/opt/hermes
      - ./vendor/restaurant-stack:/opt/restaurant-stack:ro
    restart: always
    depends_on:
      - mastra
      - redis
      - rkeeper-etl
      - iiko-etl
      - hermes-dashboard

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  mastra:
    build:
      context: .
      dockerfile: Dockerfile.mastra
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - RKEEPER_DB_PATH=/data/rkeeper_data.db
      - MASTRA_DB_PATH=/data/mastra.db
      - MASTRA_SERVER_HOST=0.0.0.0
      - MASTRA_SERVER_PORT=4111
      - OPEN_NOTEBOOK_API_URL=http://open-notebook:5055
    volumes:
      - ./rkeeper_etl:/data
    restart: unless-stopped

  hermes-gateway:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: hermes-gateway
    restart: unless-stopped
    ports:
      - "9118:9118"
    volumes:
      - ./hermes_data:/opt/hermes
    env_file:
      - ./hermes_data/.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HERMES_HOME=/opt/hermes
    command: ["gateway", "run"]

  hermes-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: hermes-dashboard
    restart: unless-stopped
    ports:
      - "9119:9119"
    volumes:
      - ./hermes_data:/opt/hermes
    env_file:
      - ./hermes_data/.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HERMES_HOME=/opt/hermes
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-admin}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:-HermesDashboard2026!}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_BASIC_AUTH_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef}
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--skip-build"]

  mastra-mcp:
    build:
      context: ./mastra-mcp
      dockerfile: Dockerfile
    container_name: mastra-mcp
    restart: unless-stopped
    ports:
      - "4112:4112"
    volumes:
      - ./rkeeper_etl:/data
    environment:
      - NODE_ENV=production
      - RKEEPER_DB_PATH=/data/rkeeper_data.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - MASTRA_MCP_PORT=4112
      - MASTRA_MCP_PATH=/mcp
      - OPEN_NOTEBOOK_API_URL=http://open-notebook:5055

  iiko-etl:
    build:
      context: .
      dockerfile: Dockerfile.iiko-etl
    restart: unless-stopped
    ports:
      - "8791:8791"
    environment:
      - RKEEPER_DB_PATH=/data/rkeeper_data.db
      - IIKO_ETL_SERVICE_URL=http://iiko-etl:8791
      - IIKO_SERVER_URL=${IIKO_SERVER_URL:-https://403-115-825.iiko.it}
      - IIKO_LOGIN=${IIKO_LOGIN:-geniok}
      - IIKO_PASSWORD=${IIKO_PASSWORD:-20Upiter17}
      - IIKO_VERIFY_SSL=${IIKO_VERIFY_SSL:-false}
      - IIKO_ETL_INTERVAL_SECONDS=${IIKO_ETL_INTERVAL_SECONDS:-3600}
      - IIKO_REQUEST_TIMEOUT_SECONDS=${IIKO_REQUEST_TIMEOUT_SECONDS:-60}
      - IIKO_ETL_PORT=8791
    volumes:
      - ./rkeeper_etl:/data

  rkeeper-etl:
    build:
      context: .
      dockerfile: Dockerfile.rkeeper-etl
    restart: unless-stopped
    ports:
      - "8690:8690"
    environment:
      - RKEEPER_DB_PATH=/data/rkeeper_data.db
      - RKEEPER_ETL_SERVICE_URL=http://rkeeper-etl:8690
      - ETL_INTERVAL_SECONDS=${ETL_INTERVAL_SECONDS:-3600}
      - RKEEPER_ETL_WRITE_MODE=${RKEEPER_ETL_WRITE_MODE:-overwrite}
      - RK_SERVER_IP=${RK_SERVER_IP:-}
      - RK_HTTP_PORT=${RK_HTTP_PORT:-16058}
      - RK_USERNAME=${RK_USERNAME:-}
      - RK_PASSWORD=${RK_PASSWORD:-}
      - MSSQL_SERVER=${MSSQL_SERVER:-}
      - MSSQL_DATABASE=${MSSQL_DATABASE:-}
      - MSSQL_USER=${MSSQL_USER:-}
      - MSSQL_PASSWORD=${MSSQL_PASSWORD:-}
      - MSSQL_PORT=${MSSQL_PORT:-1433}
      - MSSQL_DRIVER=${MSSQL_DRIVER:-}
    volumes:
      - ./rkeeper_etl:/data

  open-notebook-surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/open_notebook.db
    user: root
    volumes:
      - open_notebook_surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: unless-stopped

  open-notebook:
    image: lfnovo/open_notebook:v1-latest
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY:-change-me-to-a-secret-string}
      - SURREAL_URL=ws://open-notebook-surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
    volumes:
      - open_notebook_data:/app/data
    depends_on:
      - open-notebook-surrealdb
    restart: unless-stopped

volumes:
  open_notebook_data:
  open_notebook_surreal_data:
